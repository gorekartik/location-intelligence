services:
  - type: web
    name: location-intel-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma
    startCommand: npx tsx apps/api/src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
